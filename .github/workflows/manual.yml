on:
  workflow_dispatch:
    inputs:
      postid:
        type: string
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun russian-roulette-manual.ts ${{ inputs.postid }}
        env:
          DISCUIT_MOD_PASSWORD: ${{ secrets.DISCUIT_MOD_PASSWORD }}
